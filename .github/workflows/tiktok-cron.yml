name: Publicador de TikTok Automático v3

on:
  workflow_dispatch:
    inputs:
      videoId:
        description: 'ID del vídeo a forzar (opcional)'
        required: false
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10 

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./tiktok-bot
        run: npm install

      - name: 🚀 Fast-Fail Check (Ver si hay vídeos en la urna)
        id: check_queue
        working-directory: ./tiktok-bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node -e "const admin = require('firebase-admin'); const svc = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT); admin.initializeApp({credential: admin.credential.cert(svc)}); (async () => { try { const cnt = await admin.firestore().collection('video_submissions').where('status','==','queued_for_tiktok').count().get(); const count = cnt.data().count; console.log('📊 Videos en cola:', count); const fs = require('fs'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'has_videos=' + (count > 0 ? 'true' : 'false') + '\n'); process.exit(0); } catch(e) { console.error('Error comprobando cola:', e); process.exit(1); } })();"

      - name: Install Playwright browsers
        # 🚨 NUEVO: Solo instala el navegador pesado si hay vídeos o si es un test manual
        if: steps.check_queue.outputs.has_videos == 'true' || github.event.inputs.videoId != ''
        working-directory: ./tiktok-bot
        run: npx playwright install chromium --with-deps

      - name: Execute TikTok Publisher
        # 🚨 NUEVO: Solo ejecuta el bot si hay vídeos o si es un test manual
        if: steps.check_queue.outputs.has_videos == 'true' || github.event.inputs.videoId != ''
        working-directory: ./tiktok-bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          TARGET_VIDEO_ID: ${{ github.event.inputs.videoId }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node publish.js

      - name: Subir Captura de Error
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug-screenshot
          path: ./tiktok-bot/error-pantalla.png
          retention-days: 3

      - name: 🚑 Rescate de Firestore (Forzar 'idle' tras cancelación o fallo)
        # Se ejecuta SIEMPRE que el workflow haya fallado o sido cancelado
        if: cancelled() || failure()
        working-directory: ./tiktok-bot
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node -e "
            const admin = require('firebase-admin');
            const svc = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            if (!admin.apps.length) admin.initializeApp({credential: admin.credential.cert(svc)});
            admin.firestore().doc('system_stats/counters').set({ bot_status: 'idle' }, { merge: true })
              .then(() => { console.log('✅ Estado reseteado a idle exitosamente tras la cancelación.'); process.exit(0); })
              .catch((err) => { console.error('❌ Error al resetear estado:', err); process.exit(1); });
          "